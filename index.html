<!DOCTYPE html>
<html lang="pt-br">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portal Garage Band Mário Cravo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 24px;
            min-height: 100vh;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .tabs a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .tabs a:hover, .tabs a.active {
            color: #ffb347;
            border-bottom-color: #ffb347;
        }

        .search-box {
            max-width: 500px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 48px;
            font-size: 1rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            background: rgba(255,255,255,0.95);
            color: #1a1a2e;
            outline: none;
        }

        .search-box input:focus {
            border-color: #ffb347;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .music-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .music-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .music-info-left {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            flex: 2;
            min-width: 180px;
        }

        .music-title {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .music-title:hover {
            background: rgba(255,180,71,0.2);
        }

        .music-name {
            font-weight: 600;
            color: #ffdd99;
            font-size: 1rem;
        }

        .music-artist {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        .link-lyrics {
            font-size: 0.7rem;
            color: #ffb347;
            background: rgba(255,180,71,0.15);
            padding: 4px 10px;
            border-radius: 30px;
        }

        .music-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .player-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .player-label span {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.6);
        }

        audio {
            height: 34px;
            width: 130px;
            border-radius: 40px;
        }

        .results-info {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 30px;
            display: inline-block;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .detail-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.15);
            min-height: 70vh;
        }

        .lyrics-section {
            flex: 3;
            min-width: 320px;
        }

        .lyrics-section h3 {
            color: #ffb347;
            margin-bottom: 24px;
            font-size: 1.5rem;
            border-left: 4px solid #ffb347;
            padding-left: 16px;
        }

        .lyrics-content {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            line-height: 1.7;
            color: #f5f5dc;
            white-space: pre-wrap;
            max-height: 65vh;
            overflow-y: auto;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }

        .players-section {
            flex: 1.2;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .player-card {
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 24px 20px;
            text-align: center;
        }

        .player-card h4 {
            color: #ffcc77;
            margin-bottom: 18px;
            font-size: 1.1rem;
        }

        .player-card audio {
            width: 100%;
            height: 44px;
        }

        @media (max-width: 700px) {
            .music-info {
                flex-direction: column;
                align-items: flex-start;
            }
            .music-controls {
                width: 100%;
                justify-content: space-between;
            }
            audio {
                width: 120px;
            }
            .detail-container {
                padding: 24px;
            }
            .tabs {
                gap: 15px;
            }
            .tabs a {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <a href="index.html" class="active">Músicas</a>
        <a href="biblioteca.html">Biblioteca</a>
        <a href="ensaios.html">Fotos & Vídeos</a>
    </div>

    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Digite música ou artista..." autocomplete="off">
    </div>

    <div id="resultsContent"></div>
</div>

<script src="musicas.js"></script>
<script>
    let currentView = "list";
    let currentSong = null;
    let currentLyricsText = "";
    let musicDatabase = [];

    const resultsDiv = document.getElementById("resultsContent");
    const searchInput = document.getElementById("searchInput");

    function filterSongs(songs, query) {
        if (!query.trim()) return [];
        const q = query.toLowerCase();
        return songs.filter(s => s.nome.toLowerCase().includes(q) || s.artista.toLowerCase().includes(q));
    }

    async function loadLyrics(file) {
        try {
            const res = await fetch(`letras/${file}`);
            if (!res.ok) throw new Error();
            return await res.text();
        } catch {
            return "❌ Letra não encontrada.";
        }
    }

    function showDetail(song) {
        currentSong = song;
        currentView = "detail";
        render();
    }

    function backToList() {
        currentView = "list";
        currentSong = null;
        render();
    }

    function renderDetail() {
        if (!currentSong) return;
        resultsDiv.innerHTML = `
            <div>
                <button class="back-btn" id="backBtn">← Voltar</button>
                <div class="detail-container">
                    <div class="lyrics-section">
                        <h3>📖 ${escapeHtml(currentSong.nome)} - ${escapeHtml(currentSong.artista)}</h3>
                        <div class="lyrics-content">${escapeHtml(currentLyricsText).replace(/\n/g,'<br>')}</div>
                    </div>
                    <div class="players-section">
                        <div class="player-card">
                            <h4>🎧 Música Original</h4>
                            <audio controls src="musicas/${currentSong.mp3}"></audio>
                        </div>
                        <div class="player-card">
                            <h4>🎹 Backing Track</h4>
                            <audio controls src="musicas/${currentSong.backingTrack}"></audio>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById("backBtn")?.addEventListener("click", () => {
            currentView = "list";
            currentSong = null;
            render();
        });
    }

    function renderList() {
        const term = searchInput.value;
        
        if (!term.trim()) {
            resultsDiv.innerHTML = '';
            return;
        }
        
        let filtered = filterSongs(musicDatabase, term);
        if (filtered.length === 0) {
            resultsDiv.innerHTML = `<div class="empty-message">😕 Nenhuma música encontrada para "${escapeHtml(term)}"</div>`;
            return;
        }

        let html = `<div class="results-info">✨ ${filtered.length} música(s) encontrada(s)</div>`;
        filtered.forEach(song => {
            html += `
                <div class="music-card">
                    <div class="music-info">
                        <div class="music-info-left">
                            <div class="music-title" data-song='${JSON.stringify(song)}'>
                                <div class="music-name">${escapeHtml(song.nome)}</div>
                                <div class="music-artist">${escapeHtml(song.artista)}</div>
                            </div>
                            <div class="link-lyrics">📄 Letra</div>
                        </div>
                        <div class="music-controls">
                            <div class="player-label">
                                <span>🎧 Original</span>
                                <audio controls src="musicas/${song.mp3}"></audio>
                            </div>
                            <div class="player-label">
                                <span>🎹 Backing</span>
                                <audio controls src="musicas/${song.backingTrack}"></audio>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        resultsDiv.innerHTML = html;

        document.querySelectorAll('.music-title').forEach(el => {
            el.addEventListener('click', async (e) => {
                const song = JSON.parse(el.dataset.song);
                currentLyricsText = await loadLyrics(song.txt);
                showDetail(song);
            });
        });
    }

    function render() {
        if (currentView === "detail") renderDetail();
        else renderList();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function loadDB() {
        if (typeof musicData !== 'undefined') {
            musicDatabase = musicData;
            render();
        } else {
            resultsDiv.innerHTML = '<div class="empty-message">⚠️ Erro ao carregar playlist.</div>';
        }
    }

    searchInput.addEventListener("input", () => { if (currentView === "list") render(); });
    loadDB();
</script>
</body>
</html>
