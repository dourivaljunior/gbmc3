<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portal Garage Band Mário Cravo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        /* Overlay escuro para contraste */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: rgba(30, 30, 40, 0.85);
            border-radius: 20px;
            backdrop-filter: blur(3px);
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffd966;
            text-shadow: 2px 2px 4px #000;
            letter-spacing: 2px;
        }

        .sub {
            text-align: center;
            margin-bottom: 25px;
            font-style: italic;
            color: #ddd;
        }

        /* Caixa de busca */
        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 80%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            outline: none;
            background-color: #f0f0f0;
            color: #1e1e2a;
            text-align: center;
        }
        .search-box input::placeholder {
            color: #777;
        }

        /* Botão Voltar (estilo principal) */
        .back-btn {
            background-color: #ff7b2c;
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover {
            background-color: #e05a00;
            transform: scale(1.02);
        }

        /* Layout três colunas (listagem principal) */
        .three-columns {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
            min-width: 200px;
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            padding: 15px;
            backdrop-filter: blur(4px);
        }
        .col h3 {
            text-align: center;
            border-bottom: 2px solid #ffaa44;
            display: inline-block;
            width: 100%;
            padding-bottom: 8px;
            margin-bottom: 20px;
            color: #ffcc77;
        }

        /* Lista de músicas */
        .music-list {
            list-style: none;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        .music-list li {
            margin-bottom: 12px;
            padding: 8px;
            background: rgba(255,255,240,0.1);
            border-radius: 12px;
            transition: 0.1s;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .music-list li:hover {
            background: rgba(255,200,100,0.3);
        }
        .song-name {
            font-weight: bold;
            color: #ffdd99;
            flex: 2;
            cursor: pointer;
            word-break: break-word;
        }
        .song-name small {
            font-weight: normal;
            font-size: 0.7rem;
            color: #ccc;
        }
        .audio-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            flex: 3;
        }
        audio {
            max-width: 140px;
            height: 35px;
        }

        /* ===========================================
           PÁGINA DE DETALHE (LETRA + PLAYERS LADO A LADO)
           =========================================== */
        .detail-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 15px;
        }
        .lyrics-area {
            flex: 2;
            min-width: 250px;
            background: rgba(0,0,0,0.85);
            border-radius: 24px;
            padding: 20px;
            border-left: 6px solid #ffaa44;
            max-height: 70vh;
            overflow-y: auto;
        }
        .lyrics-area h3 {
            color: #ffbb55;
            margin-bottom: 15px;
            border-bottom: 1px solid #ffaa44;
            padding-bottom: 8px;
        }
        .lyrics-content {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #f5f5dc;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .players-area {
            flex: 1;
            min-width: 260px;
            background: rgba(0,0,0,0.7);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-self: flex-start;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .player-card h4 {
            color: #ffcc77;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        .player-card audio {
            width: 100%;
            max-width: 280px;
            height: 45px;
        }
        .song-title-detail {
            font-size: 1.2rem;
            color: #ddd;
            text-align: center;
            margin-bottom: 5px;
        }
        .back-btn-container {
            text-align: left;
            margin-bottom: 15px;
        }
        hr {
            border-color: #ffaa4433;
            margin: 15px 0;
        }

        /* Scroll */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffaa44;
            border-radius: 10px;
        }

        @media (max-width: 800px) {
            .three-columns {
                flex-direction: column;
            }
            .detail-container {
                flex-direction: column;
            }
            .players-area {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .player-card {
                flex: 1;
            }
            audio {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>🎸 Portal Garage Band Mário Cravo 🥁</h1>
    <div class="sub">Estúdio virtual - Toque, cante e sinta a música</div>

    <!-- Busca global (visível em todas as telas) -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Buscar música, artista... exemplo: 'Gita' ou 'Raul'" autocomplete="off">
    </div>

    <!-- Área dinâmica: lista principal OU detalhe da música com letra + players -->
    <div id="dynamicContent"></div>

    <footer style="text-align: center; margin-top: 30px; font-size: 0.8rem; color: #ccc;">
        🎵 Clique no nome da música → Letra + players originais e backing tracks | Volte quando quiser
    </footer>
</div>

<script>
    // --------------------------------------------------------------
    // BANCO DE DADOS DE MÚSICAS (adicione quantas precisar)
    // --------------------------------------------------------------
    const musicDatabase = [
        {
            id: 1,
            nome: "Gita",
            artista: "Raul Seixas",
            mp3: "gita.mp3",
            backingTrack: "gitabt.mp3",
            txt: "gita-raul-seixas.txt"
        }
        // =================================================================
        // COMO ADICIONAR MAIS MÚSICAS (mais de 100):
        // Copie o bloco abaixo e cole dentro do array, ajustando os valores:
        // {
        //     id: 2,
        //     nome: "Título da música",
        //     artista: "Nome do artista",
        //     mp3: "arquivo.mp3",
        //     backingTrack: "arquivobt.mp3",
        //     txt: "arquivo-letra.txt"
        // },
        // =================================================================
        // Exemplo extra:
        // {
        //     id: 2,
        //     nome: "Yesterday",
        //     artista: "Beatles",
        //     mp3: "yesterday.mp3",
        //     backingTrack: "yesterdaybt.mp3",
        //     txt: "yesterday-beatles.txt"
        // },
        // {
        //     id: 3,
        //     nome: "Alucinação",
        //     artista: "Belchior",
        //     mp3: "alucinacao.mp3",
        //     backingTrack: "alucinacaobt.mp3",
        //     txt: "alucinacao-belchior.txt"
        // }
    ];

    // Estado da aplicação
    let currentView = "list";      // "list" ou "detail"
    let currentSong = null;        // guarda a música completa que está em detalhe
    let currentLyricsText = "Carregando letra...";
    let searchTerm = "";

    // Elementos
    const dynamicDiv = document.getElementById("dynamicContent");
    const searchInputElem = document.getElementById("searchInput");

    // Helper: ordenar por nome
    function sortSongs(songs) {
        return [...songs].sort((a, b) => a.nome.localeCompare(b.nome));
    }

    // Filtrar por nome ou artista
    function filterSongs(songs, query) {
        if (!query.trim()) return songs;
        const lowerQuery = query.toLowerCase();
        return songs.filter(s => 
            s.nome.toLowerCase().includes(lowerQuery) || 
            s.artista.toLowerCase().includes(lowerQuery)
        );
    }

    // Carregar o conteúdo do arquivo .txt
    async function loadLyricsFromFile(txtFile) {
        try {
            const response = await fetch(txtFile);
            if (!response.ok) throw new Error(`Arquivo ${txtFile} não encontrado.`);
            return await response.text();
        } catch (error) {
            console.error(error);
            return `❌ Erro ao carregar a letra: ${error.message}\n\nVerifique se o arquivo "${txtFile}" está na mesma pasta do HTML.`;
        }
    }

    // Exibir a tela de detalhe (letra + players lado a lado)
    async function showSongDetail(song) {
        currentSong = song;
        // Carrega a letra do arquivo
        currentLyricsText = await loadLyricsFromFile(song.txt);
        currentView = "detail";
        renderDynamicContent();
    }

    // Função que renderiza a tela de detalhe (com botão voltar, letra à esquerda, players à direita)
    function renderDetailView() {
        if (!currentSong) return;
        
        // Monta a estrutura: container flexível com duas áreas
        const html = `
            <div class="back-btn-container">
                <button class="back-btn" id="backToMainBtn">← Voltar para página principal</button>
            </div>
            <div class="detail-container">
                <!-- Lado esquerdo: letra -->
                <div class="lyrics-area">
                    <h3>📖 ${escapeHtml(currentSong.nome)} - ${escapeHtml(currentSong.artista)}</h3>
                    <div class="lyrics-content">${escapeHtml(currentLyricsText).replace(/\n/g, '<br>')}</div>
                </div>
                <!-- Lado direito: players (original + backing track) -->
                <div class="players-area">
                    <div class="player-card">
                        <h4>🎧 Música Original</h4>
                        <audio controls preload="metadata">
                            <source src="${currentSong.mp3}" type="audio/mpeg">
                            Seu navegador não suporta áudio.
                        </audio>
                    </div>
                    <div class="player-card">
                        <h4>🎹 Backing Track</h4>
                        <audio controls preload="metadata">
                            <source src="${currentSong.backingTrack}" type="audio/mpeg">
                            Seu navegador não suporta áudio.
                        </audio>
                    </div>
                    <div class="song-title-detail">
                        <small>🎵 ${escapeHtml(currentSong.nome)} - ${escapeHtml(currentSong.artista)}</small>
                    </div>
                </div>
            </div>
        `;
        
        dynamicDiv.innerHTML = html;
        
        // Adiciona evento ao botão voltar
        const backBtn = document.getElementById("backToMainBtn");
        if (backBtn) {
            backBtn.addEventListener("click", () => {
                currentView = "list";
                currentSong = null;
                renderDynamicContent();
            });
        }
    }

    // Gera as três colunas (listagem principal)
    function renderThreeColumns(songsToRender) {
        if (songsToRender.length === 0) {
            return `<div style="text-align:center; padding:40px; background: rgba(0,0,0,0.6); border-radius: 30px;">🎵 Nenhuma música encontrada. Tente outra busca.</div>`;
        }

        let col1Html = `<div class="col"><h3>🎤 Música & Autor</h3><ul class="music-list">`;
        let col2Html = `<div class="col"><h3>🎧 Original</h3><ul class="music-list">`;
        let col3Html = `<div class="col"><h3>🎹 Backing Track</h3><ul class="music-list">`;

        songsToRender.forEach(song => {
            // Coluna 1: Nome + artista + clique para detalhe
            col1Html += `
                <li>
                    <span class="song-name" data-id="${song.id}" data-txt="${song.txt}" data-nome="${song.nome}" data-artista="${song.artista}" data-mp3="${song.mp3}" data-bt="${song.backingTrack}">
                        ${escapeHtml(song.nome)} - ${escapeHtml(song.artista)} 
                        <small>(📄 clique p/ letra + players)</small>
                    </span>
                </li>`;
            
            // Coluna 2: Player original
            col2Html += `
                <li>
                    <div class="audio-controls">
                        <audio controls preload="metadata">
                            <source src="${song.mp3}" type="audio/mpeg">
                        </audio>
                    </div>
                </li>`;
            
            // Coluna 3: Player backing track
            col3Html += `
                <li>
                    <div class="audio-controls">
                        <audio controls preload="metadata">
                            <source src="${song.backingTrack}" type="audio/mpeg">
                        </audio>
                    </div>
                </li>`;
        });

        col1Html += `</ul></div>`;
        col2Html += `</ul></div>`;
        col3Html += `</ul></div>`;

        return `<div class="three-columns">${col1Html}${col2Html}${col3Html}</div>`;
    }

    // Adicionar eventos de clique nos nomes das músicas (delegação após render)
    function attachSongClickEvents() {
        const songItems = document.querySelectorAll('.song-name');
        songItems.forEach(item => {
            // Remove listener anterior para evitar duplicação
            item.removeEventListener('click', songClickHandler);
            item.addEventListener('click', songClickHandler);
        });
    }

    // Manipulador do clique - abre a página de detalhe com a música selecionada
    function songClickHandler(event) {
        const target = event.currentTarget;
        const songId = parseInt(target.getAttribute('data-id'));
        const songNome = target.getAttribute('data-nome');
        const songArtista = target.getAttribute('data-artista');
        const songMp3 = target.getAttribute('data-mp3');
        const songBt = target.getAttribute('data-bt');
        const songTxt = target.getAttribute('data-txt');
        
        // Encontra a música completa no banco (ou cria objeto)
        let selectedSong = musicDatabase.find(s => s.id === songId);
        if (!selectedSong && songNome) {
            // fallback caso não encontre pelo ID (segurança)
            selectedSong = {
                id: songId,
                nome: songNome,
                artista: songArtista,
                mp3: songMp3,
                backingTrack: songBt,
                txt: songTxt
            };
        }
        if (selectedSong) {
            showSongDetail(selectedSong);
        } else {
            alert("Erro ao identificar a música.");
        }
    }

    // Função principal que decide o que renderizar (lista ou detalhe)
    async function renderDynamicContent() {
        if (currentView === "detail") {
            renderDetailView();
            return;
        }
        
        // Modo lista: pegar termo da busca, filtrar, ordenar e montar as três colunas
        const term = searchInputElem.value;
        searchTerm = term;
        let filtered = filterSongs(musicDatabase, term);
        filtered = sortSongs(filtered);
        
        const columnsHtml = renderThreeColumns(filtered);
        dynamicDiv.innerHTML = columnsHtml;
        attachSongClickEvents();
    }

    // Evento de busca ao digitar (só afeta a lista)
    function onSearchInput() {
        if (currentView === "list") {
            renderDynamicContent();
        }
        // Se estiver no detalhe, a busca não interfere (mas manterá o estado)
    }

    // Escapar HTML para segurança
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Inicialização: verifica se há músicas, se não houver adiciona exemplo educativo
    if (musicDatabase.length === 0) {
        musicDatabase.push({
            id: 999,
            nome: "Exemplo",
            artista: "Adicione suas músicas",
            mp3: "exemplo.mp3",
            backingTrack: "exemplobt.mp3",
            txt: "exemplo.txt"
        });
        console.warn("⚠️ Nenhuma música cadastrada. Adicione suas músicas seguindo o modelo!");
    }

    // Garantir que todos os ids sejam únicos (caso algum esteja faltando)
    musicDatabase.forEach((song, idx) => {
        if (!song.id) song.id = idx + 1;
    });

    // Event listener da busca
    searchInputElem.addEventListener("input", onSearchInput);
    
    // Render inicial
    renderDynamicContent();
</script>
</body>
</html>
