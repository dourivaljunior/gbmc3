<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portal Garage Band Mário Cravo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.45) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd966 0%, #ffb347 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .search-container {
            max-width: 550px;
            margin: 0 auto 40px auto;
            width: 100%;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            pointer-events: none;
        }

        .search-box input {
            width: 100%;
            padding: 18px 20px 18px 52px;
            font-size: 1rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            outline: none;
            background: rgba(255,255,255,0.95);
            color: #1a1a2e;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .search-box input:focus {
            border-color: #ffb347;
            background: white;
            box-shadow: 0 0 0 3px rgba(255,180,71,0.2);
        }

        .search-box input::placeholder {
            color: #999;
            font-weight: 400;
        }

        .results-container {
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-info {
            text-align: center;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .music-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .music-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px 20px;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .music-card:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,180,71,0.4);
        }

        .music-info-left {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            flex: 2;
            min-width: 180px;
        }

        .music-title {
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px;
            padding: 4px 8px;
            margin: -4px -8px;
        }

        .music-title:hover {
            background: rgba(255,180,71,0.2);
            transform: scale(1.01);
        }

        .music-name {
            font-size: 1rem;
            font-weight: 600;
            color: #ffdd99;
            margin-bottom: 4px;
        }

        .music-artist {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        .link-lyrics {
            font-size: 0.7rem;
            color: #ffb347;
            background: rgba(255,180,71,0.15);
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 500;
            white-space: nowrap;
        }

        .music-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .music-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .player-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .player-label span {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }

        audio {
            height: 34px;
            border-radius: 40px;
            width: 130px;
        }

        /* PÁGINA DE DETALHE */
        .detail-view {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 28px;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateX(-4px);
        }

        .detail-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.15);
            min-height: 70vh;
        }

        .lyrics-section {
            flex: 3;
            min-width: 320px;
        }

        .lyrics-section h3 {
            color: #ffb347;
            margin-bottom: 24px;
            font-size: 1.5rem;
            font-weight: 600;
            border-left: 4px solid #ffb347;
            padding-left: 16px;
        }

        .lyrics-content {
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 1rem;
            line-height: 1.7;
            color: #f5f5dc;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-height: 65vh;
            overflow-y: auto;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }

        .players-section {
            flex: 1.2;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .player-card {
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 24px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-card h4 {
            color: #ffcc77;
            margin-bottom: 18px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .player-card audio {
            width: 100%;
            max-width: 100%;
            height: 44px;
        }

        .song-title-detail {
            text-align: center;
            padding-top: 12px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffb347;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .music-info {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .music-controls {
                width: 100%;
                justify-content: space-between;
            }
            
            audio {
                width: 120px;
            }
            
            .detail-container {
                padding: 24px;
            }
            
            .lyrics-section h3 {
                font-size: 1.2rem;
            }
            
            .lyrics-content {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <h1>🎸 Portal Garage Band<br>Mário Cravo</h1>
    </div>

    <div class="search-container">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Digite uma música ou artista para começar" autocomplete="off">
        </div>
    </div>

    <div id="resultsContent"></div>
</div>

<script src="musicas.js"></script>
<script>
    let currentView = "list";
    let currentSong = null;
    let currentLyricsText = "";
    let musicDatabase = [];

    const resultsDiv = document.getElementById("resultsContent");
    const searchInputElem = document.getElementById("searchInput");

    function sortSongs(songs) {
        return [...songs].sort((a, b) => a.nome.localeCompare(b.nome));
    }

    function filterSongs(songs, query) {
        if (!query.trim()) return [];
        const lowerQuery = query.toLowerCase();
        return songs.filter(s => 
            s.nome.toLowerCase().includes(lowerQuery) || 
            s.artista.toLowerCase().includes(lowerQuery)
        );
    }

    async function loadLyricsFromFile(txtFile) {
        try {
            const response = await fetch(txtFile);
            if (!response.ok) throw new Error(`Arquivo ${txtFile} não encontrado`);
            return await response.text();
        } catch (error) {
            return `❌ Erro ao carregar letra: ${error.message}\n\nVerifique se o arquivo "${txtFile}" está na mesma pasta.`;
        }
    }

    async function showSongDetail(song) {
        currentSong = song;
        currentLyricsText = await loadLyricsFromFile(song.txt);
        currentView = "detail";
        render();
    }

    function renderDetailView() {
        if (!currentSong) return;
        
        const html = `
            <div class="detail-view">
                <button class="back-btn" id="backToMainBtn">← Voltar para busca</button>
                <div class="detail-container">
                    <div class="lyrics-section">
                        <h3>📖 ${escapeHtml(currentSong.nome)} - ${escapeHtml(currentSong.artista)}</h3>
                        <div class="lyrics-content">${escapeHtml(currentLyricsText).replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="players-section">
                        <div class="player-card">
                            <h4>🎧 Música Original</h4>
                            <audio controls preload="metadata" src="${currentSong.mp3}"></audio>
                        </div>
                        <div class="player-card">
                            <h4>🎹 Backing Track</h4>
                            <audio controls preload="metadata" src="${currentSong.backingTrack}"></audio>
                        </div>
                        <div class="song-title-detail">
                            ${escapeHtml(currentSong.nome)} · ${escapeHtml(currentSong.artista)}
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        resultsDiv.innerHTML = html;
        
        document.getElementById("backToMainBtn")?.addEventListener("click", () => {
            currentView = "list";
            currentSong = null;
            render();
        });
    }

    function renderListView() {
        const term = searchInputElem.value;
        
        // Se não tem termo de busca, não mostra NADA (sem box, sem frase)
        if (!term.trim()) {
            resultsDiv.innerHTML = '';
            return;
        }
        
        let filtered = filterSongs(musicDatabase, term);
        filtered = sortSongs(filtered);

        if (filtered.length === 0) {
            resultsDiv.innerHTML = `
                <div style="text-align:center; padding:40px; background:rgba(255,255,255,0.05); border-radius:32px;">
                    <p>😕 Nenhuma música encontrada para "${escapeHtml(term)}"</p>
                </div>
            `;
            return;
        }

        const resultsText = filtered.length === 1 ? '1 música encontrada' : `${filtered.length} músicas encontradas`;
        
        let html = `
            <div class="results-container">
                <div class="results-info">✨ ${resultsText}</div>
                <div class="music-list">
        `;

        filtered.forEach(song => {
            html += `
                <div class="music-card">
                    <div class="music-info">
                        <div class="music-info-left">
                            <div class="music-title" data-song='${JSON.stringify(song)}'>
                                <div class="music-name">${escapeHtml(song.nome)}</div>
                                <div class="music-artist">${escapeHtml(song.artista)}</div>
                            </div>
                            <div class="link-lyrics">📄 Letra</div>
                        </div>
                        <div class="music-controls">
                            <div class="player-label">
                                <span>🎧 Original</span>
                                <audio controls preload="metadata">
                                    <source src="${song.mp3}" type="audio/mpeg">
                                </audio>
                            </div>
                            <div class="player-label">
                                <span>🎹 Backing</span>
                                <audio controls preload="metadata">
                                    <source src="${song.backingTrack}" type="audio/mpeg">
                                </audio>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        html += `</div></div>`;
        resultsDiv.innerHTML = html;

        document.querySelectorAll('.music-title').forEach(title => {
            title.addEventListener('click', (e) => {
                e.stopPropagation();
                const songData = JSON.parse(title.getAttribute('data-song'));
                showSongDetail(songData);
            });
        });
    }

    function render() {
        if (currentView === "detail") {
            renderDetailView();
        } else {
            renderListView();
        }
    }

    function onSearchInput() {
        if (currentView === "list") {
            render();
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function loadMusicDatabase() {
        if (typeof musicData !== 'undefined') {
            musicDatabase = musicData;
            musicDatabase.forEach((song, idx) => {
                if (!song.id) song.id = idx + 1;
            });
            render();
        } else {
            resultsDiv.innerHTML = `<div style="text-align:center; padding:40px;"><p>⚠️ Erro ao carregar playlist. Verifique o arquivo musicas.js</p></div>`;
        }
    }

    searchInputElem.addEventListener("input", onSearchInput);
    loadMusicDatabase();
</script>
</body>
</html>
