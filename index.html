<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portal Garage Band Mário Cravo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        /* Overlay mais leve e transparente para mostrar a imagem de fundo */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: rgba(20, 20, 30, 0.7);
            border-radius: 20px;
            backdrop-filter: blur(2px);
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffd966;
            text-shadow: 2px 2px 4px #000;
            letter-spacing: 2px;
        }

        .sub {
            text-align: center;
            margin-bottom: 25px;
            font-style: italic;
            color: #f0f0f0;
            text-shadow: 1px 1px 2px #000;
        }

        /* Caixa de busca */
        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 80%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            outline: none;
            background-color: rgba(255,255,255,0.9);
            color: #1e1e2a;
            text-align: center;
        }
        .search-box input::placeholder {
            color: #777;
        }

        /* Botão Voltar */
        .back-btn {
            background-color: #ff7b2c;
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover {
            background-color: #e05a00;
            transform: scale(1.02);
        }

        /* Layout três colunas (listagem principal) */
        .three-columns {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
            min-width: 200px;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 15px;
            backdrop-filter: blur(2px);
        }
        .col h3 {
            text-align: center;
            border-bottom: 2px solid #ffaa44;
            display: inline-block;
            width: 100%;
            padding-bottom: 8px;
            margin-bottom: 20px;
            color: #ffcc77;
            text-shadow: 1px 1px 1px #000;
        }

        /* Lista de músicas */
        .music-list {
            list-style: none;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        .music-list li {
            margin-bottom: 12px;
            padding: 8px;
            background: rgba(255,255,240,0.15);
            border-radius: 12px;
            transition: 0.1s;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .music-list li:hover {
            background: rgba(255,200,100,0.35);
        }
        .song-name {
            font-weight: bold;
            color: #ffdd99;
            flex: 2;
            cursor: pointer;
            word-break: break-word;
            text-shadow: 1px 1px 1px #000;
        }
        .song-name small {
            font-weight: normal;
            font-size: 0.7rem;
            color: #eee;
        }
        .audio-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            flex: 3;
        }
        audio {
            max-width: 140px;
            height: 35px;
        }

        /* Página de detalhe (letra + players) */
        .detail-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 15px;
        }
        .lyrics-area {
            flex: 2;
            min-width: 250px;
            background: rgba(0,0,0,0.75);
            border-radius: 24px;
            padding: 20px;
            border-left: 6px solid #ffaa44;
            max-height: 70vh;
            overflow-y: auto;
        }
        .lyrics-area h3 {
            color: #ffbb55;
            margin-bottom: 15px;
            border-bottom: 1px solid #ffaa44;
            padding-bottom: 8px;
        }
        .lyrics-content {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #f5f5dc;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .players-area {
            flex: 1;
            min-width: 260px;
            background: rgba(0,0,0,0.65);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-self: flex-start;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .player-card h4 {
            color: #ffcc77;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        .player-card audio {
            width: 100%;
            max-width: 280px;
            height: 45px;
        }
        .song-title-detail {
            font-size: 1.2rem;
            color: #ddd;
            text-align: center;
            margin-bottom: 5px;
        }
        .back-btn-container {
            text-align: left;
            margin-bottom: 15px;
        }

        /* Scroll */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffaa44;
            border-radius: 10px;
        }

        @media (max-width: 800px) {
            .three-columns {
                flex-direction: column;
            }
            .detail-container {
                flex-direction: column;
            }
            .players-area {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .player-card {
                flex: 1;
            }
            audio {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>🎸 Portal Garage Band Mário Cravo 🥁</h1>
    <div class="sub">Estúdio virtual - Toque, cante e sinta a música</div>

    <!-- Busca global -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Buscar música, artista... exemplo: 'Gita' ou 'Raul'" autocomplete="off">
    </div>

    <!-- Área dinâmica -->
    <div id="dynamicContent"></div>

    <footer style="text-align: center; margin-top: 30px; font-size: 0.8rem; color: #ddd;">
        🎵 Clique no nome da música → Letra + players originais e backing tracks | Volte quando quiser
    </footer>
</div>

<script src="musicas.js"></script>
<script>
    // Estado da aplicação
    let currentView = "list";
    let currentSong = null;
    let currentLyricsText = "Carregando letra...";
    let musicDatabase = [];

    // Elementos
    const dynamicDiv = document.getElementById("dynamicContent");
    const searchInputElem = document.getElementById("searchInput");

    // Helper: ordenar por nome
    function sortSongs(songs) {
        return [...songs].sort((a, b) => a.nome.localeCompare(b.nome));
    }

    // Filtrar por nome ou artista
    function filterSongs(songs, query) {
        if (!query.trim()) return songs;
        const lowerQuery = query.toLowerCase();
        return songs.filter(s => 
            s.nome.toLowerCase().includes(lowerQuery) || 
            s.artista.toLowerCase().includes(lowerQuery)
        );
    }

    // Carregar conteúdo do arquivo .txt
    async function loadLyricsFromFile(txtFile) {
        try {
            const response = await fetch(txtFile);
            if (!response.ok) throw new Error(`Arquivo ${txtFile} não encontrado.`);
            return await response.text();
        } catch (error) {
            console.error(error);
            return `❌ Erro ao carregar a letra: ${error.message}\n\nVerifique se o arquivo "${txtFile}" está na mesma pasta do HTML.`;
        }
    }

    // Exibir tela de detalhe
    async function showSongDetail(song) {
        currentSong = song;
        currentLyricsText = await loadLyricsFromFile(song.txt);
        currentView = "detail";
        renderDynamicContent();
    }

    // Renderizar tela de detalhe
    function renderDetailView() {
        if (!currentSong) return;
        
        const html = `
            <div class="back-btn-container">
                <button class="back-btn" id="backToMainBtn">← Voltar para página principal</button>
            </div>
            <div class="detail-container">
                <div class="lyrics-area">
                    <h3>📖 ${escapeHtml(currentSong.nome)} - ${escapeHtml(currentSong.artista)}</h3>
                    <div class="lyrics-content">${escapeHtml(currentLyricsText).replace(/\n/g, '<br>')}</div>
                </div>
                <div class="players-area">
                    <div class="player-card">
                        <h4>🎧 Música Original</h4>
                        <audio controls preload="metadata">
                            <source src="${currentSong.mp3}" type="audio/mpeg">
                            Seu navegador não suporta áudio.
                        </audio>
                    </div>
                    <div class="player-card">
                        <h4>🎹 Backing Track</h4>
                        <audio controls preload="metadata">
                            <source src="${currentSong.backingTrack}" type="audio/mpeg">
                            Seu navegador não suporta áudio.
                        </audio>
                    </div>
                    <div class="song-title-detail">
                        <small>🎵 ${escapeHtml(currentSong.nome)} - ${escapeHtml(currentSong.artista)}</small>
                    </div>
                </div>
            </div>
        `;
        
        dynamicDiv.innerHTML = html;
        
        const backBtn = document.getElementById("backToMainBtn");
        if (backBtn) {
            backBtn.addEventListener("click", () => {
                currentView = "list";
                currentSong = null;
                renderDynamicContent();
            });
        }
    }

    // Gerar três colunas
    function renderThreeColumns(songsToRender) {
        if (songsToRender.length === 0) {
            return `<div style="text-align:center; padding:40px; background: rgba(0,0,0,0.5); border-radius: 30px;">🎵 Nenhuma música encontrada. Tente outra busca.</div>`;
        }

        let col1Html = `<div class="col"><h3>🎤 Música & Autor</h3><ul class="music-list">`;
        let col2Html = `<div class="col"><h3>🎧 Original</h3><ul class="music-list">`;
        let col3Html = `<div class="col"><h3>🎹 Backing Track</h3><ul class="music-list">`;

        songsToRender.forEach(song => {
            col1Html += `
                <li>
                    <span class="song-name" data-id="${song.id}" data-txt="${song.txt}" data-nome="${song.nome}" data-artista="${song.artista}" data-mp3="${song.mp3}" data-bt="${song.backingTrack}">
                        ${escapeHtml(song.nome)} - ${escapeHtml(song.artista)} 
                        <small>(📄 clique p/ letra + players)</small>
                    </span>
                </li>`;
            
            col2Html += `
                <li>
                    <div class="audio-controls">
                        <audio controls preload="metadata">
                            <source src="${song.mp3}" type="audio/mpeg">
                        </audio>
                    </div>
                </li>`;
            
            col3Html += `
                <li>
                    <div class="audio-controls">
                        <audio controls preload="metadata">
                            <source src="${song.backingTrack}" type="audio/mpeg">
                        </audio>
                    </div>
                </li>`;
        });

        col1Html += `</ul></div>`;
        col2Html += `</ul></div>`;
        col3Html += `</ul></div>`;

        return `<div class="three-columns">${col1Html}${col2Html}${col3Html}</div>`;
    }

    // Evento de clique nas músicas
    function attachSongClickEvents() {
        const songItems = document.querySelectorAll('.song-name');
        songItems.forEach(item => {
            item.removeEventListener('click', songClickHandler);
            item.addEventListener('click', songClickHandler);
        });
    }

    function songClickHandler(event) {
        const target = event.currentTarget;
        const songId = parseInt(target.getAttribute('data-id'));
        const songNome = target.getAttribute('data-nome');
        const songArtista = target.getAttribute('data-artista');
        const songMp3 = target.getAttribute('data-mp3');
        const songBt = target.getAttribute('data-bt');
        const songTxt = target.getAttribute('data-txt');
        
        let selectedSong = musicDatabase.find(s => s.id === songId);
        if (!selectedSong && songNome) {
            selectedSong = {
                id: songId,
                nome: songNome,
                artista: songArtista,
                mp3: songMp3,
                backingTrack: songBt,
                txt: songTxt
            };
        }
        if (selectedSong) {
            showSongDetail(selectedSong);
        } else {
            alert("Erro ao identificar a música.");
        }
    }

    // Renderizar conteúdo principal
    async function renderDynamicContent() {
        if (currentView === "detail") {
            renderDetailView();
            return;
        }
        
        const term = searchInputElem.value;
        let filtered = filterSongs(musicDatabase, term);
        filtered = sortSongs(filtered);
        
        const columnsHtml = renderThreeColumns(filtered);
        dynamicDiv.innerHTML = columnsHtml;
        attachSongClickEvents();
    }

    // Evento de busca
    function onSearchInput() {
        if (currentView === "list") {
            renderDynamicContent();
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Carregar músicas do arquivo externo
    function loadMusicDatabase() {
        if (typeof musicData !== 'undefined') {
            musicDatabase = musicData;
            // Garantir que todas têm ID
            musicDatabase.forEach((song, idx) => {
                if (!song.id) song.id = idx + 1;
            });
            renderDynamicContent();
        } else {
            console.error("Arquivo musicas.js não carregou corretamente");
            dynamicDiv.innerHTML = `<div style="text-align:center; padding:40px;">⚠️ Erro ao carregar playlist. Verifique se o arquivo musicas.js existe.</div>`;
        }
    }

    // Inicialização
    searchInputElem.addEventListener("input", onSearchInput);
    loadMusicDatabase();
</script>
</body>
</html>
