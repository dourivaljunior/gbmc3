<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 30px;
            display: inline-block;
            text-decoration: none;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h3 {
            color: #ffcc77;
            margin-bottom: 12px;
        }
        .card p {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .btn {
            background: rgba(255,180,71,0.2);
            border: 1px solid rgba(255,180,71,0.5);
            padding: 6px 14px;
            border-radius: 30px;
            color: #ffb347;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
        }
        .btn:hover {
            background: rgba(255,180,71,0.4);
            color: white;
        }
        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Voltar para principal</a>
    <h1>📚 Biblioteca</h1>
    <div class="grid">
        <div class="card"><h3>📘 Teoria Musical</h3><p>Apostila Para Estudos.</p><a href="#" class="btn">Baixar PDF</a></div>
        <div class="card"><h3>🎸 Cifras do Repertório</h3><p>Cifras Organizadas.</p><a href="#" class="btn">Baixar PDF</a></div>
        <div class="card"><h3>🥁 Exercícios de Ritmo</h3><p>Livros e Apostilas.</p><a href="#" class="btn">Baixar PDF</a></div>
        <div class="card"><h3>🔗 Links Úteis</h3><p>Links Sobre Música.</p><a href="#" class="btn">Acessar</a></div>
    </div>
</div>
</body>
</html>
