<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fotos e Vídeos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 30px;
            display: inline-block;
            text-decoration: none;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .video-grid, .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }
        .video-card, .photo-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
        }
        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .video-card h3, .photo-card p {
            padding: 12px;
            font-size: 0.9rem;
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        @media (max-width: 700px) {
            .video-grid, .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Voltar para principal</a>
    <h1>📹 Fotos e Vídeos</h1>

    <div class="video-grid">
        <div class="video-card">
            <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe></div>
            <h3>Ensaio - Gita (Raul Seixas)</h3>
        </div>
        <div class="video-card">
            <div class="video-wrapper"><video controls src="videos/ensaio.mp4"></video></div>
            <h3>Making Of - Backstage</h3>
        </div>
    </div>

    <div class="gallery">
        <div class="photo-card"><img src="fotos/ensaio1.jpg" alt="foto"><p>Ensaio 15/03</p></div>
        <div class="photo-card"><img src="fotos/ensaio2.jpg" alt="foto"><p>Sessão de gravação</p></div>
        <div class="photo-card"><img src="fotos/ensaio3.jpg" alt="foto"><p>Mário Cravo na guitarra</p></div>
    </div>
</div>
</body>
</html>
